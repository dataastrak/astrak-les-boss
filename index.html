<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Astrak - Les Boss</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Outfit', sans-serif;
      background: #0a0a2e;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 30% 40%, rgba(90, 231, 222, 0.12) 0%, transparent 50%),
        radial-gradient(circle at 70% 60%, rgba(255, 239, 94, 0.08) 0%, transparent 50%);
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
      max-width: 700px;
    }

    .emoji-top {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      animation: bounce 2s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    h1 {
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 900;
      line-height: 1.1;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, #5AE7DE 0%, #FFEF5E 50%, #5AE7DE 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradient-shift 3s ease-in-out infinite;
    }

    @keyframes gradient-shift {
      0%, 100% { background-position: 0% center; }
      50% { background-position: 100% center; }
    }

    .subtitle {
      font-size: clamp(1.1rem, 3vw, 1.5rem);
      font-weight: 600;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 2rem;
    }

    .stats {
      display: flex;
      justify-content: center;
      gap: 2.5rem;
      margin-bottom: 2.5rem;
      flex-wrap: wrap;
    }

    .stat {
      text-align: center;
    }

    .stat-value {
      font-size: 2.2rem;
      font-weight: 800;
      color: #5AE7DE;
    }

    .stat-label {
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.4);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-top: 0.25rem;
    }

    .tagline {
      display: inline-block;
      background: rgba(90, 231, 222, 0.1);
      border: 1px solid rgba(90, 231, 222, 0.25);
      padding: 0.75rem 2rem;
      border-radius: 50px;
      font-size: 0.9rem;
      font-weight: 600;
      color: #5AE7DE;
      letter-spacing: 0.5px;
    }

    .particles {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: rgba(90, 231, 222, 0.3);
      border-radius: 50%;
      animation: float linear infinite;
    }

    @keyframes float {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="particles" id="particles"></div>

  <div class="container">
    <div class="emoji-top">👑</div>
    <h1>Astrak, les boss.</h1>
    <p class="subtitle">Ouais, on est trop fort. Tout simplement.</p>

    <div class="stats">
      <div class="stat">
        <div class="stat-value">100%</div>
        <div class="stat-label">Boss energy</div>
      </div>
      <div class="stat">
        <div class="stat-value">∞</div>
        <div class="stat-label">Talent</div>
      </div>
      <div class="stat">
        <div class="stat-value">0</div>
        <div class="stat-label">Limites</div>
      </div>
    </div>

    <div class="tagline">🚀 SEO Agency qui claque depuis toujours</div>
  </div>

  <script>
    const container = document.getElementById('particles');
    for (let i = 0; i < 25; i++) {
      const p = document.createElement('div');
      p.classList.add('particle');
      p.style.left = Math.random() * 100 + '%';
      p.style.animationDuration = (4 + Math.random() * 6) + 's';
      p.style.animationDelay = Math.random() * 5 + 's';
      p.style.width = p.style.height = (2 + Math.random() * 4) + 'px';
      container.appendChild(p);
    }
  </script>

</body>
</html>
